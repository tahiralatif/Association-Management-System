<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #2563eb; color: white; padding: 24px; text-align: center; border-radius: 8px 8px 0 0; }
    .header h1 { margin: 0; font-size: 24px; }
    .content { background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
    .btn { display: inline-block; background: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin: 16px 0; }
    .footer { text-align: center; color: #9ca3af; font-size: 12px; padding: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{ association_name | default("AssocHub") }}</h1>
    </div>
    <div class="content">
      <p>Hi {{ member_name }},</p>
      <h2>{{ title }}</h2>
      <p>{{ message }}</p>
      {% if action_url %}
      <a href="{{ action_url }}" class="btn">{{ action_label | default("View Details") }}</a>
      {% endif %}
    </div>
    <div class="footer">
      <p>This is an automated message. Please do not reply to this email.</p>
    </div>
  </div>
</body>
</html>
